name: Garcar Deploy - MARS API

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 13 * * *'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Test import
        run: python -c "import main; print('MARS API imports OK')"

      - name: Deploy to Railway
        if: env.RAILWAY_TOKEN != ''
        run: |
          npm install -g @railway/cli
          railway up --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Skip deploy (no token)
        if: env.RAILWAY_TOKEN == ''
        run: echo "RAILWAY_TOKEN not set - skipping deploy. Add secret to enable auto-deploy."
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Notify deploy
        if: always()
        run: |
          echo "MARS API pipeline complete"
          curl -s -X POST https://api.resend.com/emails \
            -H "Authorization: Bearer ${{ secrets.RESEND_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"from":"deploy@garcar.io","to":"carrolgarrett55@gmail.com","subject":"MARS API Pipeline Complete","html":"<h2>MARS API Deploy Pipeline Finished</h2>"}' || true
